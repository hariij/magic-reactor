name: Deploy to Surge
on:
  push:
    branches:
      - live

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - name: Install Surge
        run: npm install -g surge
      - name: Deploy dist folder
        run: surge ./dist --token ${{ secrets.SURGE_TOKEN }}